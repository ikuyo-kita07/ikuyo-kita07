<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moshi Moshi! | Kita's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffb7c5;
            --primary-glow: rgba(255, 183, 197, 0.4);
            --bg-dark: #080808;
            --card-bg: rgba(25, 25, 25, 0.7);
            --text-main: #ffffff;
            --text-dim: #bda4a9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            /* Subtle radial gradient for depth */
            background-image: radial-gradient(circle at 50% 50%, #1a1012 0%, #080808 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary-glow);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .section h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 1.2rem;
            font-weight: 700;
            text-align: center;
        }

        .section p {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.7;
            text-align: center;
        }

        .icon-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .icon-grid img {
            width: 36px;
            height: 36px;
            filter: grayscale(0.2) drop-shadow(0 0 5px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .icon-grid img:hover {
            filter: grayscale(0);
            transform: scale(1.2) translateY(-3px);
        }

        .projects-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .projects-button:hover {
            transform: scale(1.05);
            background: #fff;
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
            opacity: 0.7;
            font-style: italic;
        }

        /* Animated Petals */
        .petal {
            position: fixed;
            top: -10px;
            background: url('https://cdn-icons-png.flaticon.com/512/774/774832.png') no-repeat center/contain;
            opacity: 0.6;
            animation: fall linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1.5rem; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Hello, I'm Kita!</h1>
        </div>
        <div class="content">
            <div class="section">
                <h2>About Me</h2>
                <p>17-year-old dev who started coding at 12. Gamer, explorer, and a person guided by faith.</p>
            </div>
            <div class="section">
                <h2>Let's Chat</h2>
                <p>Join our discord community for more!</p>
                <div class="icon-grid" style="margin-top: 1rem;">
                    <a href="https://discord.gg/E6DbYWj3PS" target="_blank">
                        <img src="https://skillicons.dev/icons?i=discord" alt="Discord" style="width: 45px; height: 45px;">
                    </a>
                </div>
            </div>
            <div class="section">
                <h2>Tech Stacks</h2>
                <div class="icon-grid">
                    <img src="https://skillicons.dev/icons?i=c" alt="C">
                    <img src="https://skillicons.dev/icons?i=bash" alt="Bash">
                    <img src="https://skillicons.dev/icons?i=kotlin" alt="Kotlin">
                </div>
            </div>
            <div class="section">
                <h2>Operating Systems</h2>
                <div class="icon-grid">
                    <img src="https://skillicons.dev/icons?i=linux" alt="Linux">
                    <img src="https://skillicons.dev/icons?i=apple" alt="macOS">
                    <img src="https://skillicons.dev/icons?i=android" alt="Android">
                    <img src="https://skillicons.dev/icons?i=windows" alt="Windows">
                </div>
            </div>
        </div>
        <div style="text-align: center; display: flex; flex-direction: column; gap: 1rem; align-items: center;">
            <a href="projects.html" class="projects-button">Explore My Projects</a>
        </div>
        <div class="footer">
            <p>"When the time is right, I, the Lord, will make it happen." — Isaiah 60:22</p>
        </div>
    </div>
    <script>
        const numPetals = 25;
        for(let i = 0; i < numPetals; i++) {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            const size = 10 + Math.random() * 15;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = 6 + Math.random() * 7 + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(petal);
        }
    </script>
</body>
</html>
